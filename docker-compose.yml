version: "3.9"
services:
  backend:
    build: .
    command: ["uv", "run", "start"]
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql+psycopg://postgres:postgres@db:5432/barghouth"
      APP_ENV: "development"
      LOG_LEVEL: "INFO"
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: barghouth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
